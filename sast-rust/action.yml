name: "SAST"
description: "Static analysis with cargo audit (RustSec advisory database)"

inputs:
  manifest_path:
    description: "Path to Cargo.lock"
    required: false
    default: "Cargo.lock"
  deny_warnings:
    description: "Fail on warnings in addition to vulnerabilities"
    required: false
    default: "false"
  config_path:
    description: "Path to audit.toml config file"
    required: false
    default: ""

outputs:
  cve_count:
    description: "Number of vulnerabilities found"
    value: ${{ steps.audit.outputs.cve_count }}

runs:
  using: "composite"
  steps:
    - name: "Install cargo-audit"
      shell: bash
      run: |
        cargo install cargo-audit --quiet
        echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ) level=info event=cargo_audit_installed version=$(cargo audit --version)"

    - name: "Run audit"
      id: audit
      shell: bash
      run: |
        set +e
        ${{ inputs.config_path != '' && format('mkdir -p .cargo && cp {0} .cargo/audit.toml', inputs.config_path) || '' }}
        cargo audit --file "${{ inputs.manifest_path }}" \
          2>&1 | tee /tmp/audit.txt
